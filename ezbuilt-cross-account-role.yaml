AWSTemplateFormatVersion: "2010-09-09"
Description: "Create a cross account IAM role for EZBuilt to manage infrastructure in this AWS account."

Parameters:
  PlatformAccountId:
    Type: String
    Description: "AWS Account ID of the EZBuilt platform (source account) that will assume this role."
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: "Must be a valid 12 digit AWS account number."

  ExternalId:
    Type: String
    Description: "External ID used by the platform when calling sts:AssumeRole."
    MinLength: 8
    MaxLength: 128
    NoEcho: true

  RoleName:
    Type: String
    Description: "Name of the IAM role to create."
    Default: "EzBuiltTerraformRole"

Resources:
  EzBuiltTerraformRole:
    Type: "AWS::IAM::Role"
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${PlatformAccountId}:root"
            Action: "sts:AssumeRole"
            Condition:
              StringEquals:
                "sts:ExternalId": !Ref ExternalId

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess
        - arn:aws:iam::aws:policy/AmazonVPCFullAccess

      Tags:
        - Key: Project
          Value: EZBuilt
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  RoleArn:
    Description: "The IAM Role ARN that EZBuilt will assume."
    Value: !GetAtt EzBuiltTerraformRole.Arn

  ExternalIdOutput:
    Description: "External ID used to assume the role."
    Value: !Ref ExternalId
